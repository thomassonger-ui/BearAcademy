<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Why Structured Sales Wins — Quick Check</title>
<style>
  :root {
    --navy: #1B365D;
    --black: #000000;
    --white: #ffffff;
    --light: #f7f9fc;
    --gold: #D4AF37;
    --green: #2e7d32;
    --green-bg: #e8f5e9;
    --red: #c62828;
    --red-bg: #ffebee;
    --gray: #6b7280;
    --line: #d9d9d9;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { background: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; color: #222; line-height: 1.5; }
  .wrap { max-width: 760px; margin: 0 auto; padding: 16px; }
  .header { background: var(--navy); color: var(--white); padding: 16px 20px; border-radius: 6px 6px 0 0; }
  .header h1 { font-size: 18px; font-weight: 800; letter-spacing: 0.3px; }
  .header p { font-size: 13px; opacity: 0.92; margin-top: 4px; }
  .body { background: #fff; border: 1px solid var(--line); border-top: none; padding: 18px 20px; border-radius: 0 0 6px 6px; }

  .progress { display: flex; gap: 6px; margin-bottom: 18px; }
  .pill { flex: 1; height: 6px; background: #e6ebf2; border-radius: 999px; }
  .pill.active { background: var(--navy); }
  .pill.correct { background: var(--green); }
  .pill.wrong { background: var(--red); }

  .qstem { font-size: 17px; font-weight: 600; line-height: 1.5; margin-bottom: 14px; color: #1a1a1a; }
  .qcount { font-size: 12px; font-weight: 700; color: var(--gray); letter-spacing: 1px; margin-bottom: 6px; }

  .choices { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
  .choice {
    flex: 1; min-width: 140px;
    padding: 14px 18px;
    border: 2px solid var(--navy);
    background: #fff;
    color: var(--navy);
    font-weight: 800;
    font-size: 16px;
    letter-spacing: 0.5px;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.1s, color 0.1s, border-color 0.1s;
  }
  .choice:hover:not(:disabled) { background: var(--navy); color: #fff; }
  .choice:disabled { cursor: not-allowed; opacity: 0.85; }
  .choice.picked { background: var(--navy); color: #fff; }
  .choice.is-right { background: var(--green-bg); color: var(--green); border-color: var(--green); }
  .choice.is-wrong { background: var(--red-bg); color: var(--red); border-color: var(--red); }

  .rationale {
    display: none;
    padding: 12px 14px;
    border-radius: 6px;
    font-size: 14px;
    line-height: 1.5;
    margin-bottom: 14px;
  }
  .rationale.show { display: block; }
  .rationale.right { background: var(--green-bg); color: var(--green); border-left: 4px solid var(--green); }
  .rationale.wrong { background: var(--red-bg); color: var(--red); border-left: 4px solid var(--red); }
  .rationale strong { font-weight: 800; }

  .nav { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .btn { font-family: inherit; font-size: 14px; font-weight: 700; padding: 10px 18px; border-radius: 6px; border: 0; cursor: pointer; }
  .btn-primary { background: var(--black); color: #fff; }
  .btn-secondary { background: var(--navy); color: #fff; }
  .btn-ghost { background: #fff; color: var(--navy); border: 2px solid var(--navy); }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .score { margin-left: auto; font-weight: 800; font-size: 14px; color: var(--navy); }

  .results { display: none; padding: 18px 20px; border-radius: 6px; text-align: center; }
  .results.show { display: block; }
  .results.tier-100 { background: var(--green-bg); color: var(--green); border-left: 4px solid var(--green); }
  .results.tier-66  { background: #fff8e1; color: #b06500; border-left: 4px solid var(--gold); }
  .results.tier-0   { background: var(--red-bg); color: var(--red); border-left: 4px solid var(--red); }
  .results h2 { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
  .results p { font-size: 14px; }
  .footer { font-size: 11px; color: #999; text-align: center; padding: 12px 0 4px; letter-spacing: 0.4px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>QUICK CHECK · Why Structured Sales Wins</h1>
    <p>Three quick questions. True or False — and why.</p>
  </div>

  <div class="body">
    <div class="progress" id="progress">
      <div class="pill active"></div>
      <div class="pill"></div>
      <div class="pill"></div>
    </div>

    <div id="quiz">
      <div class="qcount" id="qcount">QUESTION 1 OF 3</div>
      <div class="qstem" id="qstem"></div>
      <div class="choices">
        <button class="choice" id="btn-true" data-choice="true">TRUE</button>
        <button class="choice" id="btn-false" data-choice="false">FALSE</button>
      </div>
      <div class="rationale" id="rationale"></div>
      <div class="nav">
        <button class="btn btn-primary" id="btn-next" disabled>Next →</button>
        <div class="score" id="score"></div>
      </div>
    </div>

    <div class="results" id="results"></div>
  </div>

  <div class="footer">Bear Academy · Quick Check · Section 3</div>
</div>

<script>
(function(){
  const QUESTIONS = [
    {
      stem: "At Bear Team, structured sales means every client interaction follows a repeatable process so nothing gets missed.",
      answer: true,
      whyRight: "Correct. The Bear Team approach is defined as a repeatable process underneath every client interaction — that's the system that catches what memory misses.",
      whyWrong: "Look again. Page text states: <em>“structured sales means every client interaction follows a repeatable process.”</em> That's exactly the Bear Team standard."
    },
    {
      stem: "In the Bear Team approach, the system replaces an agent's personality, market knowledge, and relationship skills.",
      answer: false,
      whyRight: "Correct. Bear Team systems run <em>underneath</em> the agent's skills — the page explicitly says: <em>“You still bring your personality, your market knowledge, and your relationship skills.”</em>",
      whyWrong: "Re-read the lesson. The system <em>supports</em> your skills; it doesn't replace them. You still bring personality, market knowledge, and relationships — the system just makes sure nothing slips."
    },
    {
      stem: "Bear Team agents are expected to track follow-ups by memory or by sending themselves text messages.",
      answer: false,
      whyRight: "Correct. BearTeamOS™ triggers follow-up reminders automatically and the CRM holds client preferences and history. Memory and texts are the unstructured anti-pattern the Bear Team approach replaces.",
      whyWrong: "That's the unstructured approach the lesson warns against. Bear Team agents log clients in the CRM and let BearTeamOS™ trigger the follow-up reminders — not memory, not stray texts."
    }
  ];

  let qi = 0;          // current question index
  let correctCount = 0;
  let answered = false;

  const stem = document.getElementById('qstem');
  const qcount = document.getElementById('qcount');
  const progress = document.getElementById('progress');
  const rationale = document.getElementById('rationale');
  const btnTrue = document.getElementById('btn-true');
  const btnFalse = document.getElementById('btn-false');
  const btnNext = document.getElementById('btn-next');
  const scoreEl = document.getElementById('score');
  const resultsEl = document.getElementById('results');
  const quizEl = document.getElementById('quiz');

  function renderQuestion(){
    answered = false;
    const q = QUESTIONS[qi];
    stem.textContent = q.stem;
    qcount.textContent = 'QUESTION ' + (qi+1) + ' OF ' + QUESTIONS.length;
    [btnTrue, btnFalse].forEach(b => {
      b.disabled = false;
      b.classList.remove('picked','is-right','is-wrong');
    });
    rationale.className = 'rationale';
    rationale.innerHTML = '';
    btnNext.disabled = true;
    btnNext.textContent = (qi === QUESTIONS.length - 1) ? 'See My Score' : 'Next →';
    scoreEl.textContent = correctCount + ' / ' + QUESTIONS.length;
    // progress pills — mark active
    progress.children[qi].classList.add('active');
  }

  function pick(choiceBool){
    if (answered) return;
    answered = true;
    const q = QUESTIONS[qi];
    const correct = (choiceBool === q.answer);
    if (correct) correctCount++;

    // mark the picked button
    const picked = choiceBool ? btnTrue : btnFalse;
    const other  = choiceBool ? btnFalse : btnTrue;
    picked.classList.add('picked', correct ? 'is-right' : 'is-wrong');
    // also visually mark the correct one if user got it wrong
    if (!correct) {
      (q.answer ? btnTrue : btnFalse).classList.add('is-right');
    }
    btnTrue.disabled = true; btnFalse.disabled = true;

    // rationale
    rationale.classList.add('show', correct ? 'right' : 'wrong');
    rationale.innerHTML = (correct ? '✓ <strong>Correct.</strong> ' : '✗ <strong>Not quite.</strong> ')
                        + (correct ? q.whyRight : q.whyWrong);

    // progress pill
    progress.children[qi].classList.remove('active');
    progress.children[qi].classList.add(correct ? 'correct' : 'wrong');

    // score
    scoreEl.textContent = correctCount + ' / ' + QUESTIONS.length;

    btnNext.disabled = false;
  }

  btnTrue.addEventListener('click', () => pick(true));
  btnFalse.addEventListener('click', () => pick(false));

  btnNext.addEventListener('click', () => {
    if (qi < QUESTIONS.length - 1) {
      qi++;
      renderQuestion();
    } else {
      showResults();
    }
  });

  function showResults(){
    quizEl.style.display = 'none';
    resultsEl.classList.remove('tier-0','tier-66','tier-100');
    let tier, msg;
    if (correctCount === 3) {
      tier = 'tier-100';
      msg = '<h2>3 / 3 — Locked in.</h2><p>You understand why Bear Team runs structured. Move on to the next lesson.</p>';
    } else if (correctCount === 2) {
      tier = 'tier-66';
      msg = '<h2>2 / 3 — Almost.</h2><p>Re-read the one you missed and try again. Structured sales only works if the principle is clear.</p>';
    } else {
      tier = 'tier-0';
      msg = '<h2>'+correctCount+' / 3 — Re-read the page.</h2><p>The Bear Team approach is built on the difference between memory-based and system-based sales. Review the page and retake.</p>';
    }
    resultsEl.classList.add(tier, 'show');
    resultsEl.innerHTML = msg + '<div style="margin-top:14px;"><button class="btn btn-secondary" id="btn-retry">Try Again</button></div>';
    document.getElementById('btn-retry').addEventListener('click', () => {
      qi = 0; correctCount = 0;
      Array.from(progress.children).forEach(p => p.className = 'pill');
      progress.children[0].classList.add('active');
      resultsEl.classList.remove('show','tier-0','tier-66','tier-100');
      quizEl.style.display = '';
      renderQuestion();
    });
  }

  renderQuestion();
})();
</script>
</body>
</html>
